server {
    server_name soa.laziestlife.com;

    root /var/www/iot-ai-doll/frontend/dist;

    # 根路径 SPA (艾瑟拉奇幻谭) — 必须在 /admin/ 和 /epet/ 之前
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Admin frontend (SPA)
    location /admin/ {
        alias /var/www/iot-ai-doll/frontend/dist/admin/;
        try_files $uri /admin/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # EPET - React+PixiJS (new version)
    location /epet1/game-assets/ {
        alias /var/www/iot-ai-doll/frontend/dist/epet1/game-assets/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /epet1/ {
        alias /var/www/iot-ai-doll/frontend/dist/epet/;
        try_files $uri $uri/ /epet1/index.html;
    }

    # EPET - main URL (new React app)
    location /epet/ {
        root /var/www/iot-ai-doll/frontend/dist;
        index index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA deep-link fallback for /epet/* paths
    location /epet {
        root /var/www/iot-ai-doll/frontend/dist;
        try_files $uri $uri/ /epet/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # EPET2 - legacy HTML version
    location /epet2/ {
        alias /var/www/iot-ai-doll/frontend/dist/epet2/;
        try_files $uri $uri/ /epet2/index.html;
    }

    location /iot-test.html {
        root /var/www/iot-ai-doll/frontend/dist;
    }

    # EPET1 API 现在也走 3000（统一后端）
    # API proxy to backend (3000) handles all /api/* including /api/epet1/*
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/soa.laziestlife.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/soa.laziestlife.com/privkey.pem;
}
