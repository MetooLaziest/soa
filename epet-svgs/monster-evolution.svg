<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9CED57"/>
      <stop offset="100%" stop-color="#7DBF3A"/>
    </radialGradient>
    <radialGradient id="auraGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFA500" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- 进化光环 -->
  <circle cx="200" cy="250" r="150" fill="url(#auraGrad)"/>
  <circle cx="200" cy="250" r="130" fill="url(#bodyGrad)" opacity="0.9"/>
  
  <!-- 身体 - 更大更强 -->
  <ellipse cx="200" cy="250" rx="125" ry="105" fill="url(#bodyGrad)"/>
  
  <!-- 肚皮 - 闪亮 -->
  <ellipse cx="200" cy="270" rx="72" ry="62" fill="#F0FFF0" opacity="0.8"/>
  <ellipse cx="200" cy="265" rx="50" ry="40" fill="#FFFFFF" opacity="0.3"/>
  
  <!-- 角 - 进化成更大 -->
  <path d="M 175 155 L 162 110 L 185 145" fill="#FF4500"/>
  <path d="M 225 155 L 238 110 L 215 145" fill="#FF4500"/>
  <!-- 角的光环 -->
  <circle cx="162" cy="110" r="8" fill="#FFD700" opacity="0.8"/>
  <circle cx="238" cy="110" r="8" fill="#FFD700" opacity="0.8"/>
  
  <!-- 眼睛 - 进化后更锐利 -->
  <ellipse cx="170" cy="200" rx="26" ry="30" fill="#FFFFFF"/>
  <ellipse cx="230" cy="200" rx="26" ry="30" fill="#FFFFFF"/>
  <ellipse cx="175" cy="205" rx="16" ry="19" fill="#0066CC"/>
  <ellipse cx="235" cy="205" rx="16" ry="19" fill="#0066CC"/>
  <circle cx="180" cy="200" r="6" fill="#FFFFFF"/>
  <circle cx="240" cy="200" r="6" fill="#FFFFFF"/>
  <!-- 进化光芒 -->
  <circle cx="170" cy="195" r="3" fill="#00FFFF" opacity="0.8"/>
  <circle cx="230" cy="195" r="3" fill="#00FFFF" opacity="0.8"/>
  
  <!-- 腮红 - 更明显 -->
  <ellipse cx="143" cy="228" rx="18" ry="12" fill="#FFB6C1" opacity="0.8"/>
  <ellipse cx="257" cy="228" rx="18" ry="12" fill="#FFB6C1" opacity="0.8"/>
  
  <!-- 嘴巴 - 自信微笑 -->
  <path d="M 175 245 Q 200 262 225 245" stroke="#333333" stroke-width="5" fill="#FF6B6B" stroke-linecap="round"/>
  
  <!-- 进化特效 - 光环 -->
  <circle cx="200" cy="250" r="140" fill="none" stroke="#FFD700" stroke-width="3" opacity="0.6" stroke-dasharray="10 5"/>
  <circle cx="200" cy="250" r="155" fill="none" stroke="#FFA500" stroke-width="2" opacity="0.4" stroke-dasharray="15 8"/>
  
  <!-- 星星 -->
  <text x="100" y="130" font-size="35" fill="#FFD700" opacity="0.9">★</text>
  <text x="290" y="140" font-size="30" fill="#FFD700" opacity="0.8">★</text>
  <text x="80" y="180" font-size="25" fill="#FFA500" opacity="0.7">✦</text>
  <text x="310" y="190" font-size="28" fill="#FFA500" opacity="0.75">✧</text>
  
  <!-- 手臂 - 有力 -->
  <path d="M 95 250 Q 70 235 80 215" stroke="#5DBF3A" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M 305 250 Q 330 235 320 215" stroke="#5DBF3A" stroke-width="22" fill="none" stroke-linecap="round"/>
  
  <!-- 脚 - 更强壮 -->
  <ellipse cx="158" cy="340" rx="32" ry="22" fill="#5DBF3A"/>
  <ellipse cx="242" cy="340" rx="32" ry="22" fill="#5DBF3A"/>
</svg>