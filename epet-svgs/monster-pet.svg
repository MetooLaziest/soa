<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7ED957"/>
      <stop offset="100%" stop-color="#5DBF3A"/>
    </radialGradient>
  </defs>
  
  <!-- 身体 - 享受 -->
  <ellipse cx="200" cy="250" rx="120" ry="100" fill="url(#bodyGrad)"/>
  
  <!-- 肚皮 -->
  <ellipse cx="200" cy="270" rx="70" ry="60" fill="#F0FFF0" opacity="0.6"/>
  
  <!-- 角 - 放松 -->
  <path d="M 178 160 L 168 122 L 188 150" fill="#FF6B6B"/>
  <path d="M 222 160 L 232 122 L 212 150" fill="#FF6B6B"/>
  
  <!-- 眼睛 - 闭眼享受 -->
  <path d="M 150 198 Q 170 185 190 198" stroke="#333333" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 210 198 Q 230 185 250 198" stroke="#333333" stroke-width="5" fill="none" stroke-linecap="round"/>
  
  <!-- 腮红 - 很红 -->
  <ellipse cx="142" cy="225" rx="20" ry="13" fill="#FFB6C1" opacity="0.9"/>
  <ellipse cx="258" cy="225" rx="20" ry="13" fill="#FFB6C1" opacity="0.9"/>
  
  <!-- 嘴巴 - 微笑 -->
  <path d="M 175 240 Q 200 258 225 240" stroke="#333333" stroke-width="4" fill="#FF6B6B" stroke-linecap="round"/>
  
  <!-- 爱心特效 -->
  <text x="115" y="155" font-size="28" fill="#FF69B4" opacity="0.9">♥</text>
  <text x="275" y="155" font-size="24" fill="#FF69B4" opacity="0.7">♡</text>
  
  <!-- 手 - 抚摸的动画效果 (从上方下来) -->
  <ellipse cx="200" cy="155" rx="35" ry="25" fill="#FFE4B5" opacity="0.7" stroke="#DEB887" stroke-width="2"/>
  <path d="M 185 155 L 185 175" stroke="#DEB887" stroke-width="3"/>
  <path d="M 200 155 L 200 178" stroke="#DEB887" stroke-width="3"/>
  <path d="M 215 155 L 215 175" stroke="#DEB887" stroke-width="3"/>
  
  <!-- 手臂 - 放松 -->
  <path d="M 100 250 Q 85 270 95 285" stroke="#5DBF3A" stroke-width="20" fill="none" stroke-linecap="round"/>
  <path d="M 300 250 Q 315 270 305 285" stroke="#5DBF3A" stroke-width="20" fill="none" stroke-linecap="round"/>
  
  <!-- 脚 -->
  <ellipse cx="160" cy="340" rx="30" ry="20" fill="#5DBF3A"/>
  <ellipse cx="240" cy="340" rx="30" ry="20" fill="#5DBF3A"/>
</svg>