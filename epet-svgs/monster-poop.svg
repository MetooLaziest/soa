<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7ED957"/>
      <stop offset="100%" stop-color="#5DBF3A"/>
    </radialGradient>
  </defs>
  
  <!-- 身体 - 不舒服 -->
  <ellipse cx="200" cy="250" rx="120" ry="100" fill="url(#bodyGrad)"/>
  
  <!-- 肚皮 -->
  <ellipse cx="200" cy="270" rx="70" ry="60" fill="#F0FFF0" opacity="0.6"/>
  
  <!-- 角 - 垂下 -->
  <path d="M 180 160 L 172 125 L 190 150" fill="#FF6B6B"/>
  <path d="M 220 160 L 228 125 L 210 150" fill="#FF6B6B"/>
  
  <!-- 眼睛 - 不舒服 -->
  <ellipse cx="170" cy="200" rx="22" ry="25" fill="#FFFFFF"/>
  <ellipse cx="230" cy="200" rx="22" ry="25" fill="#FFFFFF"/>
  <ellipse cx="175" cy="205" rx="18" ry="20" fill="#333333"/>
  <ellipse cx="235" cy="205" rx="18" ry="20" fill="#333333"/>
  <circle cx="178" cy="202" r="4" fill="#FFFFFF"/>
  <circle cx="238" cy="202" r="4" fill="#FFFFFF"/>
  <!-- 眼珠变成螺旋状表示晕 -->
  <path d="M 175 205 m -8 0 a 8 8 0 1 1 16 0 a 6 6 0 1 1 -12 0 a 4 4 0 1 1 8 0" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <path d="M 235 205 m -8 0 a 8 8 0 1 1 16 0 a 6 6 0 1 1 -12 0 a 4 4 0 1 1 8 0" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- 腮红 - 苍白 -->
  <ellipse cx="145" cy="230" rx="12" ry="8" fill="#FFB6C1" opacity="0.3"/>
  <ellipse cx="255" cy="230" rx="12" ry="8" fill="#FFB6C1" opacity="0.3"/>
  
  <!-- 嘴巴 - 痛苦 -->
  <path d="M 185 245 Q 200 240 215 248" stroke="#333333" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- 便便符号 -->
  <ellipse cx="290" cy="200" rx="20" ry="25" fill="#8B4513" opacity="0.8"/>
  <ellipse cx="285" cy="185" rx="18" ry="22" fill="#8B4513" opacity="0.8"/>
  <ellipse cx="295" cy="190" rx="15" ry="20" fill="#8B4513" opacity="0.8"/>
  
  <!-- 手臂 - 捂肚子 -->
  <path d="M 100 250 Q 120 260 140 255" stroke="#5DBF3A" stroke-width="20" fill="none" stroke-linecap="round"/>
  <path d="M 300 250 Q 280 260 260 255" stroke="#5DBF3A" stroke-width="20" fill="none" stroke-linecap="round"/>
  
  <!-- 脚 -->
  <ellipse cx="160" cy="340" rx="30" ry="20" fill="#5DBF3A"/>
  <ellipse cx="240" cy="340" rx="30" ry="20" fill="#5DBF3A"/>
</svg>