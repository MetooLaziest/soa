  <circle cx="150" cy="165" r="8" fill="#FFFFFF" opacity="0.5" stroke="#87CEEB" stroke-width="1.5"/>
  <circle cx="270" cy="175" r="10" fill="#FFFFFF" opacity="0.55" stroke="#87CEEB" stroke-width="1.8"/>
  <circle cx="290" cy="160" r="7" fill="#FFFFFF" opacity="0.45" stroke="#87CEEB" stroke-width="1.2"/>
  
  <!-- 手臂 - 举起干净 -->
