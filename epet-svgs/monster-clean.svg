  <ellipse cx="235" cy="205" rx="15" ry="17" fill="#333333"/>
  <circle cx="180" cy="200" r="5" fill="#FFFFFF"/>
  <circle cx="240" cy="200" r="5" fill="#FFFFFF"/>
  <!-- 闪闪发光 -->
  <circle cx="170" cy="195" r="2" fill="#87CEEB"/>
  <circle cx="230" cy="195" r="2" fill="#87CEEB"/>
  
  <!-- 腮红 - 健康粉红 -->
  <ellipse cx="145" cy="228" rx="16" ry="10" fill="#FFB6C1" opacity="0.7"/>
  <ellipse cx="255" cy="228" rx="16" ry="10" fill="#FFB6C1" opacity="0.7"/>
  
  <!-- 嘴巴 - 微笑 -->
