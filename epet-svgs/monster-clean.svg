  <!-- 角 - 竖起 -->
  <path d="M 178 158 L 168 118 L 188 148" fill="#FF6B6B"/>
  <path d="M 222 158 L 232 118 L 212 148" fill="#FF6B6B"/>
  
  <!-- 眼睛 - 清爽 -->
  <ellipse cx="170" cy="200" rx="24" ry="28" fill="#FFFFFF"/>
