server {
    server_name soa.laziestlife.com;
    
    # EPET1 - React+PixiJS
    location /epet1/ {
        alias /var/www/iot-ai-doll/frontend/dist/epet1/;
        try_files $uri $uri/ /epet1/index.html;
    }

    # EPET - 静态文件优先
    location /epet/ {
        alias /var/www/iot-ai-doll/frontend/dist/epet/;
        try_files $uri $uri/ /epet/index.html;
    }

    location /iot-test.html {
        root /var/www/iot-ai-doll/frontend/dist;
    }
    
    # EPET1 API 转发到 3001
    location /api/epet1/ {
        proxy_pass http://127.0.0.1:3001/api/epet1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # API 请求转发到旧后端（3000）
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # 其他请求转发到后端
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/soa.laziestlife.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/soa.laziestlife.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = soa.laziestlife.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name soa.laziestlife.com;
    return 404;
}
